  <text x="750" y="520" fill="#3B82F6" opacity="0.85" font-size="22" font-family="Georgia, serif" transform="rotate(-15 750 520)">∂²u/∂t²</text>
  <text x="200" y="680" fill="#3B82F6" opacity="0.75" font-size="18" font-family="Georgia, serif" transform="rotate(4 200 680)">∮ E·dl</text>
  <text x="600" y="720" fill="#FFB300" opacity="0.80" font-size="16" font-family="Georgia, serif" transform="rotate(-7 600 720)">ψ(x,t)</text>
  <text x="1000" y="650" fill="#E63946" opacity="0.75" font-size="20" font-family="Georgia, serif" transform="rotate(11 1000 650)">∞</text>
  <text x="100" y="850" fill="#E63946" opacity="0.80" font-size="14" font-family="Georgia, serif" transform="rotate(-9 100 850)">iℏ∂ψ/∂t = Ĥψ</text>
  <text x="480" y="900" fill="#3B82F6" opacity="0.75" font-size="22" font-family="Georgia, serif" transform="rotate(7 480 900)">Ω</text>
  <text x="850" y="870" fill="#FFB300" opacity="0.80" font-size="16" font-family="Georgia, serif" transform="rotate(-13 850 870)">∇²φ</text>
  <text x="300" y="1050" fill="#FFB300" opacity="0.75" font-size="18" font-family="Georgia, serif" transform="rotate(5 300 1050)">α β γ</text>
  <text x="700" y="1080" fill="#E63946" opacity="0.80" font-size="14" font-family="Georgia, serif" transform="rotate(-8 700 1080)">S = k ln W</text>
  <text x="1080" y="1000" fill="#3B82F6" opacity="0.75" font-size="20" font-family="Georgia, serif" transform="rotate(10 1080 1000)">∂/∂x</text>
  <text x="50" y="1150" fill="#3B82F6" opacity="0.80" font-size="16" font-family="Georgia, serif" transform="rotate(-4 50 1150)">μ₀ε₀</text>
  <text x="550" y="1150" fill="#E63946" opacity="0.75" font-size="18" font-family="Georgia, serif" transform="rotate(14 550 1150)">ρ</text>
  <text x="950" y="1150" fill="#FFB300" opacity="0.80" font-size="22" font-family="Georgia, serif" transform="rotate(-11 950 1150)">Δ</text>

