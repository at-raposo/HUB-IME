  <text x="350" y="200" fill="#FFB300" opacity="0.75" font-size="20" font-family="Georgia, serif" transform="rotate(15 350 200)">∇×B</text>
  <text x="900" y="250" fill="#3B82F6" opacity="0.80" font-size="24" font-family="Georgia, serif" transform="rotate(-8 900 250)">∫</text>
