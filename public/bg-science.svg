<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" fill="none">
  <!-- Equations & Formulas -->
  <text x="80" y="60" fill="#3B82F6" opacity="0.85" font-size="22" font-family="Georgia, serif" transform="rotate(-12 80 60)">E = mc²</text>
  <text x="650" y="120" fill="#E63946" opacity="0.75" font-size="18" font-family="Georgia, serif" transform="rotate(8 650 120)">∂ψ/∂t</text>
